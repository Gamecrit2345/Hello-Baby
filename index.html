<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Baby 3D</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at center, #200000, #000000);
}

#text {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 20px;
  color: white;
  font-size: 30px;
  text-shadow: 0 0 15px red, 0 0 40px darkred;
  z-index: 10;
  font-family: Arial;
}

/* fake glow overlay */
.glow {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,0,0,0.15), transparent 60%);
  pointer-events: none;
}
</style>
</head>

<body>

<div id="text">Sorry Baby 💔</div>
<div class="glow"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

// =========================
// SCENE
// =========================
const scene = new THREE.Scene();

// CAMERA (slight depth feel)
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 6;

// RENDERER (better quality)
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// =========================
// LIGHTING (IMPORTANT FOR 3D LOOK)
// =========================

// soft ambient light
const ambient = new THREE.AmbientLight(0x330000, 1);
scene.add(ambient);

// strong red point light (heart glow)
const pointLight = new THREE.PointLight(0xff0000, 3, 100);
pointLight.position.set(3, 3, 3);
scene.add(pointLight);

// secondary highlight light
const whiteLight = new THREE.PointLight(0xffffff, 1.2, 100);
whiteLight.position.set(-3, 2, 2);
scene.add(whiteLight);

// =========================
// HEART SHAPE (SMOOTHER + ROUND)
// =========================
function createHeartShape() {

  const shape = new THREE.Shape();

  shape.moveTo(0, 0.5);

  shape.bezierCurveTo(0, 1.2, 1.4, 1.2, 1.4, 0.4);
  shape.bezierCurveTo(1.4, -0.3, 0.8, -0.8, 0, -1.4);
  shape.bezierCurveTo(-0.8, -0.8, -1.4, -0.3, -1.4, 0.4);
  shape.bezierCurveTo(-1.4, 1.2, 0, 1.2, 0, 0.5);

  return shape;
}

// =========================
// HEART GEOMETRY (THICK + ROUNDED)
// =========================
const geometry = new THREE.ExtrudeGeometry(createHeartShape(), {
  depth: 1.2,              // 🔥 thicker = more 3D
  bevelEnabled: true,
  bevelThickness: 0.4,
  bevelSize: 0.4,
  bevelSegments: 12
});

// =========================
// MATERIAL (GLOSSY + SHINY)
// =========================
const material = new THREE.MeshStandardMaterial({
  color: 0xff0000,
  metalness: 0.6,
  roughness: 0.25,
  emissive: 0x330000,
  emissiveIntensity: 1
});

const heart = new THREE.Mesh(geometry, material);
scene.add(heart);

// =========================
// PARTICLES (MORE CINEMATIC)
// =========================
const particles = new THREE.Group();

for (let i = 0; i < 120; i++) {

  const geo = new THREE.SphereGeometry(0.04, 10, 10);
  const mat = new THREE.MeshBasicMaterial({ color: 0xff4444 });

  const p = new THREE.Mesh(geo, mat);

  p.position.set(
    (Math.random() - 0.5) * 12,
    (Math.random() - 0.5) * 12,
    (Math.random() - 0.5) * 12
  );

  particles.add(p);
}

scene.add(particles);

// =========================
// ANIMATION (HEARTBEAT EFFECT)
// =========================

let t = 0;

function animate() {

  requestAnimationFrame(animate);

  t += 0.02;

  // smooth rotation
  heart.rotation.y += 0.008;
  heart.rotation.x += 0.004;

  // ❤️ heartbeat scaling effect
  const scale = 1 + Math.sin(t * 3) * 0.08;
  heart.scale.set(scale, scale, scale);

  // floating particles
  particles.rotation.y += 0.002;
  particles.rotation.x += 0.001;

  renderer.render(scene, camera);
}

animate();

// =========================
// RESIZE FIX
// =========================
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
