<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Baby 3D</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

#text {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 20px;
  color: white;
  font-size: 28px;
  text-shadow: 0 0 10px red;
  z-index: 10;
}
</style>
</head>

<body>

<div id="text">Sorry Baby 💔</div>

<!-- THREE.JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

// SCENE
const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 5;

// RENDERER
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.PointLight(0xff0000, 2, 100);
light.position.set(5, 5, 5);
scene.add(light);

// HEART SHAPE
function createHeartShape() {
  const shape = new THREE.Shape();

  shape.moveTo(0, 0.3);
  shape.bezierCurveTo(0, 0.8, 1, 1, 1, 0.5);
  shape.bezierCurveTo(1, 0, 0, -0.5, 0, -1);
  shape.bezierCurveTo(0, -0.5, -1, 0, -1, 0.5);
  shape.bezierCurveTo(-1, 1, 0, 0.8, 0, 0.3);

  return shape;
}

const geometry = new THREE.ExtrudeGeometry(createHeartShape(), {
  depth: 0.5,
  bevelEnabled: true,
  bevelThickness: 0.2,
  bevelSize: 0.2,
  bevelSegments: 5
});

const material = new THREE.MeshPhongMaterial({
  color: 0xff0000,
  shininess: 100
});

const heart = new THREE.Mesh(geometry, material);
scene.add(heart);

// PARTICLES
const particles = new THREE.Group();

for (let i = 0; i < 80; i++) {
  const pGeo = new THREE.SphereGeometry(0.03, 8, 8);
  const pMat = new THREE.MeshBasicMaterial({ color: 0xff4444 });

  const particle = new THREE.Mesh(pGeo, pMat);

  particle.position.x = (Math.random() - 0.5) * 10;
  particle.position.y = (Math.random() - 0.5) * 10;
  particle.position.z = (Math.random() - 0.5) * 10;

  particles.add(particle);
}

scene.add(particles);

// ANIMATION
function animate() {
  requestAnimationFrame(animate);

  heart.rotation.y += 0.01;
  heart.rotation.x += 0.005;

  particles.rotation.y += 0.002;

  renderer.render(scene, camera);
}

animate();

// RESIZE FIX
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
