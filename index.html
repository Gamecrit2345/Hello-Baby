<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Baby 3D</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at center, #200000, #000000);
}

#text {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 20px;
  color: white;
  font-size: 28px;
  text-shadow: 0 0 15px red;
  z-index: 10;
  font-family: Arial;
}

.glow {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,0,0,0.15), transparent 60%);
  pointer-events: none;
}
</style>
</head>

<body>

<div id="text">Sorry Baby 💔 (Drag the Heart)</div>
<div class="glow"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

// =========================
// SCENE
// =========================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// =========================
// LIGHTS
// =========================
scene.add(new THREE.AmbientLight(0x330000, 1));

const light = new THREE.PointLight(0xff0000, 3, 100);
light.position.set(3, 3, 3);
scene.add(light);

// =========================
// HEART SHAPE
// =========================
function createHeartShape() {
  const shape = new THREE.Shape();

  shape.moveTo(0, 0.5);
  shape.bezierCurveTo(0, 1.2, 1.4, 1.2, 1.4, 0.4);
  shape.bezierCurveTo(1.4, -0.3, 0.8, -0.8, 0, -1.4);
  shape.bezierCurveTo(-0.8, -0.8, -1.4, -0.3, -1.4, 0.4);
  shape.bezierCurveTo(-1.4, 1.2, 0, 1.2, 0, 0.5);

  return shape;
}

// =========================
// HEART OBJECT
// =========================
const geometry = new THREE.ExtrudeGeometry(createHeartShape(), {
  depth: 1.2,
  bevelEnabled: true,
  bevelThickness: 0.4,
  bevelSize: 0.4,
  bevelSegments: 10
});

const material = new THREE.MeshStandardMaterial({
  color: 0xff0000,
  metalness: 0.6,
  roughness: 0.25,
  emissive: 0x330000
});

const heart = new THREE.Mesh(geometry, material);
scene.add(heart);

// =========================
// DRAG SYSTEM (MOUSE + TOUCH)
// =========================

let isDragging = false;
let targetX = 0;
let targetY = 0;

// convert screen to world-ish movement
function getPointerPos(clientX, clientY) {
  return {
    x: (clientX / window.innerWidth) * 2 - 1,
    y: -(clientY / window.innerHeight) * 2 + 1
  };
}

// MOUSE
window.addEventListener("mousedown", () => isDragging = true);
window.addEventListener("mouseup", () => isDragging = false);

window.addEventListener("mousemove", (e) => {
  if (!isDragging) return;
  const pos = getPointerPos(e.clientX, e.clientY);
  targetX = pos.x * 3;
  targetY = pos.y * 3;
});

// TOUCH (PHONE)
window.addEventListener("touchstart", () => isDragging = true);
window.addEventListener("touchend", () => isDragging = false);

window.addEventListener("touchmove", (e) => {
  if (!isDragging) return;
  const touch = e.touches[0];
  const pos = getPointerPos(touch.clientX, touch.clientY);
  targetX = pos.x * 3;
  targetY = pos.y * 3;
});

// =========================
// ANIMATION
// =========================

let t = 0;

function animate() {

  requestAnimationFrame(animate);

  t += 0.02;

  // smooth follow (drag feel)
  heart.position.x += (targetX - heart.position.x) * 0.1;
  heart.position.y += (targetY - heart.position.y) * 0.1;

  // heartbeat pulse
  const scale = 1 + Math.sin(t * 3) * 0.08;
  heart.scale.set(scale, scale, scale);

  // slow rotation
  heart.rotation.y += 0.005;

  renderer.render(scene, camera);
}

animate();

// =========================
// RESIZE
// =========================
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
