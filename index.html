<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Baby</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  background: radial-gradient(circle at center, #1a0000, #000000);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
}

/* CENTER HEART */
.heart {
  position: absolute;
  width: 140px;
  height: 140px;
  background: red;
  transform: rotate(45deg);
  animation: beat 1s infinite;
  box-shadow: 0 0 60px red, 0 0 120px darkred;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 140px;
  height: 140px;
  background: red;
  border-radius: 50%;
}

.heart::before {
  top: -70px;
  left: 0;
}

.heart::after {
  left: -70px;
  top: 0;
}

/* TEXT */
.text {
  position: absolute;
  color: white;
  font-size: 32px;
  margin-top: 220px;
  text-shadow: 0 0 15px red, 0 0 30px darkred;
  animation: glow 2s infinite alternate;
}

/* BEAT */
@keyframes beat {
  0% { transform: rotate(45deg) scale(1); }
  50% { transform: rotate(45deg) scale(1.25); }
  100% { transform: rotate(45deg) scale(1); }
}

/* GLOW TEXT */
@keyframes glow {
  0% { opacity: 0.6; }
  100% { opacity: 1; }
}

/* FLOATING HEARTS */
.particle {
  position: absolute;
  width: 12px;
  height: 12px;
  background: red;
  transform: rotate(45deg);
  animation: float linear infinite;
  opacity: 0.7;
  box-shadow: 0 0 10px red;
}

.particle::before,
.particle::after {
  content: "";
  position: absolute;
  width: 12px;
  height: 12px;
  background: red;
  border-radius: 50%;
}

/* FLOAT ANIMATION */
@keyframes float {
  0% {
    transform: translateY(100vh) rotate(45deg);
    opacity: 0;
  }
  50% {
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh) rotate(45deg);
    opacity: 0;
  }
}

/* ORBIT HEARTS (around center) */
.orbit {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  animation: spin 10s linear infinite;
}

.orbit .smallHeart {
  position: absolute;
  width: 20px;
  height: 20px;
  background: pink;
  transform: rotate(45deg);
  box-shadow: 0 0 10px pink;
}

.orbit .smallHeart::before,
.orbit .smallHeart::after {
  content: "";
  position: absolute;
  width: 20px;
  height: 20px;
  background: pink;
  border-radius: 50%;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<!-- CENTER HEART -->
<div class="heart"></div>

<!-- TEXT -->
<div class="text">Sorry Baby 💔</div>

<!-- ORBIT HEARTS -->
<div class="orbit">
  <div class="smallHeart" style="top:0; left:50%;"></div>
  <div class="smallHeart" style="top:50%; left:0;"></div>
  <div class="smallHeart" style="top:100%; left:50%;"></div>
  <div class="smallHeart" style="top:50%; left:100%;"></div>
</div>

<script>

// floating background hearts
for (let i = 0; i < 40; i++) {
  let p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random() * window.innerWidth + "px";
  p.style.animationDuration = (2 + Math.random() * 4) + "s";
  p.style.width = p.style.height = (8 + Math.random() * 10) + "px";
  document.body.appendChild(p);
}

</script>

</body>
</html>
