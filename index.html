<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Baby 3D</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at center, #2a0000, #000000 70%);
}

#text {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 25px;
  color: white;
  font-size: 30px;
  font-family: Arial;
  text-shadow: 0 0 20px red, 0 0 40px darkred;
  z-index: 10;
}

.glow {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center,
    rgba(255,0,0,0.25),
    transparent 60%
  );
  pointer-events: none;
}
</style>
</head>

<body>

<div id="text">Sorry Baby 💔</div>
<div class="glow"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

// =========================
// SCENE
// =========================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// =========================
// LIGHTS (STRONGER CINEMATIC)
// =========================
scene.add(new THREE.AmbientLight(0x220000, 1.5));

const redLight = new THREE.PointLight(0xff0000, 5, 100);
redLight.position.set(3, 3, 3);
scene.add(redLight);

const whiteLight = new THREE.PointLight(0xffffff, 1.5, 100);
whiteLight.position.set(-3, 2, 2);
scene.add(whiteLight);

// =========================
// ❤️ BETTER HEART SHAPE (SMOOTH + ROUND)
// =========================
function createHeartShape() {

  const shape = new THREE.Shape();

  // TOP CENTER
  shape.moveTo(0, 0.7);

  // LEFT TOP CURVE
  shape.bezierCurveTo(
    -1.6, 1.6,
    -2.2, 0.6,
    -1.6, -0.3
  );

  // LEFT BOTTOM CURVE
  shape.bezierCurveTo(
    -1.2, -1.2,
    -0.4, -1.6,
    0, -2.0
  );

  // RIGHT BOTTOM CURVE
  shape.bezierCurveTo(
    0.4, -1.6,
    1.2, -1.2,
    1.6, -0.3
  );

  // RIGHT TOP CURVE
  shape.bezierCurveTo(
    2.2, 0.6,
    1.6, 1.6,
    0, 0.7
  );

  return shape;
}

// =========================
// HEART GEOMETRY (MORE DETAIL)
// =========================
const geometry = new THREE.ExtrudeGeometry(createHeartShape(), {
  depth: 1.8,            // 🔥 deeper = more 3D
  bevelEnabled: true,
  bevelThickness: 0.6,
  bevelSize: 0.6,
  bevelSegments: 20
});

// =========================
// MATERIAL (ULTRA GLOSSY)
// =========================
const material = new THREE.MeshPhysicalMaterial({
  color: 0xff0000,
  metalness: 0.9,
  roughness: 0.15,
  clearcoat: 1.0,
  clearcoatRoughness: 0.1,
  emissive: 0x330000,
  emissiveIntensity: 1.8
});

const heart = new THREE.Mesh(geometry, material);
scene.add(heart);

// =========================
// PARTICLES
// =========================
const particles = new THREE.Group();

for (let i = 0; i < 160; i++) {

  const geo = new THREE.SphereGeometry(0.03, 12, 12);
  const mat = new THREE.MeshBasicMaterial({ color: 0xff5555 });

  const p = new THREE.Mesh(geo, mat);

  p.position.set(
    (Math.random() - 0.5) * 14,
    (Math.random() - 0.5) * 14,
    (Math.random() - 0.5) * 14
  );

  particles.add(p);
}

scene.add(particles);

// =========================
// ANIMATION (SMOOTH HEARTBEAT)
// =========================

let t = 0;

function animate() {

  requestAnimationFrame(animate);

  t += 0.02;

  // smooth rotation
  heart.rotation.y += 0.006;
  heart.rotation.x += 0.003;

  // natural heartbeat (less robotic)
  const pulse = 1 + Math.sin(t * 2.5) * 0.1;
  heart.scale.set(pulse, pulse, pulse);

  // particle movement
  particles.rotation.y += 0.0015;
  particles.rotation.x += 0.001;

  renderer.render(scene, camera);
}

animate();

// =========================
// RESIZE
// =========================
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
