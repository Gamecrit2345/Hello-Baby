<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sorry Baby 3D</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle at center, #3a0000, #000000 75%);
}

#text {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 25px;
  color: white;
  font-size: 30px;
  font-family: Arial;
  text-shadow: 0 0 20px red, 0 0 50px darkred;
  z-index: 10;
}

.glow {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at center,
    rgba(255,0,0,0.25),
    transparent 55%
  );
  animation: glowPulse 2s ease-in-out infinite;
  pointer-events: none;
}

@keyframes glowPulse {
  0% { opacity: 0.5; }
  50% { opacity: 1; }
  100% { opacity: 0.5; }
}
</style>
</head>

<body>

<div id="text">Sorry Baby 💔</div>
<div class="glow"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: true
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// ================= LIGHTING (BRIGHT FIX) =================
scene.add(new THREE.AmbientLight(0x550000, 1.8));

const redLight = new THREE.PointLight(0xff0000, 5, 100);
redLight.position.set(4, 4, 4);
scene.add(redLight);

const fillLight = new THREE.PointLight(0xff6666, 2.5, 100);
fillLight.position.set(-4, 2, 3);
scene.add(fillLight);

const whiteLight = new THREE.PointLight(0xffffff, 1.8, 100);
whiteLight.position.set(0, 5, 5);
scene.add(whiteLight);

// ================= HEART SHAPE =================
function createHeartShape() {

  const shape = new THREE.Shape();

  shape.moveTo(0, 0.7);

  shape.bezierCurveTo(-1.8, 1.8, -2.4, 0.5, -1.6, -0.5);
  shape.bezierCurveTo(-1.2, -1.5, -0.4, -1.9, 0, -2.2);
  shape.bezierCurveTo(0.4, -1.9, 1.2, -1.5, 1.6, -0.5);
  shape.bezierCurveTo(2.4, 0.5, 1.8, 1.8, 0, 0.7);

  return shape;
}

// ================= HEART =================
const geometry = new THREE.ExtrudeGeometry(createHeartShape(), {
  depth: 1.8,
  bevelEnabled: true,
  bevelThickness: 0.6,
  bevelSize: 0.6,
  bevelSegments: 20
});

const material = new THREE.MeshPhysicalMaterial({
  color: 0xff0000,
  metalness: 0.85,
  roughness: 0.15,
  clearcoat: 1.0,
  emissive: 0x550000,
  emissiveIntensity: 2
});

const heart = new THREE.Mesh(geometry, material);
scene.add(heart);

// ================= PARTICLES =================
const particles = new THREE.Group();

for (let i = 0; i < 180; i++) {

  const geo = new THREE.SphereGeometry(0.035, 12, 12);
  const mat = new THREE.MeshBasicMaterial({ color: 0xff6666 });

  const p = new THREE.Mesh(geo, mat);

  p.position.set(
    (Math.random() - 0.5) * 16,
    (Math.random() - 0.5) * 16,
    (Math.random() - 0.5) * 16
  );

  particles.add(p);
}

scene.add(particles);

// ================= DRAG SYSTEM (FIXED + FAST) =================
let isDragging = false;
let targetX = 0;
let targetY = 0;

function getPointerPos(x, y) {
  return {
    x: (x / window.innerWidth) * 2 - 1,
    y: -(y / window.innerHeight) * 2 + 1
  };
}

window.addEventListener("mousedown", () => isDragging = true);
window.addEventListener("mouseup", () => isDragging = false);

window.addEventListener("mousemove", (e) => {
  if (!isDragging) return;
  const pos = getPointerPos(e.clientX, e.clientY);
  targetX = pos.x * 4;
  targetY = pos.y * 4;
});

window.addEventListener("touchstart", () => isDragging = true);
window.addEventListener("touchend", () => isDragging = false);

window.addEventListener("touchmove", (e) => {
  if (!isDragging) return;
  const t = e.touches[0];
  const pos = getPointerPos(t.clientX, t.clientY);
  targetX = pos.x * 4;
  targetY = pos.y * 4;
});

// ================= ANIMATION =================
let t = 0;

function animate() {

  requestAnimationFrame(animate);

  t += 0.02;

  // FAST SMOOTH DRAG (NO FLIP)
  heart.position.x += (targetX - heart.position.x) * 0.25;
  heart.position.y += (targetY - heart.position.y) * 0.25;

  // NORMAL ROTATION ONLY
  heart.rotation.y += 0.006;
  heart.rotation.x += 0.003;

  // HEARTBEAT
  const pulse = 1 + Math.sin(t * 2.8) * 0.10;
  heart.scale.set(pulse, pulse, pulse);

  // PARTICLES
  particles.rotation.y += 0.002;
  particles.rotation.x += 0.001;

  renderer.render(scene, camera);
}

animate();

// ================= RESIZE =================
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
